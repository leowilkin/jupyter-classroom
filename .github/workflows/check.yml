name: Python Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install .
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .
      - name: Check import sorting
        run: ruff check --select I .
      - name: Build package
        run: |
          pip install build
          python -m build
